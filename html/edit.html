<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Edit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" />
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" href="https://kit-pro.fontawesome.com/releases/v6.2.0/css/pro.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300&display=swap" rel="stylesheet">

</head>

<style>
    #notification-area {
        position: fixed;
        top: 0px;
        right: 10px;
        width: 350px;
        height: 10vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;

    }

    .form-control {
        z-index: 1000;
    }




    #notification-area .notification {
        position: relative;
        padding: 15px 10px;
        min-width: 380px;

        font-size: 14px;
        font-weight: 600;
        border-radius: 5px;
        margin: 5px 0px;
        opacity: 0;
        left: 20px;

        position: absolute;
        right: 0;
        top: 26px;

        animation: showNotification 500ms ease-in-out forwards;
    }



    @keyframes showNotification {

        0% {
            transform: translateX(100%);
            opacity: 0;
        }

        40% {
            transform: translateX(-10%);
        }

        80% {
            transform: translateX(0%);
        }

        100% {
            transform: translateX(-10px);
            opacity: 1;

        }
    }

    /* .notification.info {
  border-left: 8px solid #ffa502;
} */

    #notification-area .notification.success {
        background: #baffba;

        border-left: 8px solid #389838;
        color: #019d06;

    }

    #notification-area .notification.success::before {
        font-family: "FontAwesome";
        color: #019d06;
        content: "\f058";
        padding-right: 6px;
        display: inline-block;

        vertical-align: middle;
        font-size: 20px;
    }


    #notification-area .notification.info {
        background: #ffda9b;
        border-left: 8px solid #ffa502;
        color: #ce8500;
    }


    #notification-area .notification.info::before {
        font-family: "FontAwesome";
        color: #ce8500;
        content: "\f06a";
        padding-right: 6px;
        display: inline-block;

        vertical-align: middle;
        font-size: 20px;
    }




    #notification-area .notification.error {
        background: rgba(251, 210, 196, 1);
        border-left: 8px solid #ff0202;
        color: #ff0202;

    }

    #notification-area .notification.error::before {
        font-family: "FontAwesome";

        color: #ff0202;
        content: "\f00d";
        padding-right: 6px;
        display: inline-block;

        vertical-align: middle;
        font-size: 20px;
    }




    main {
        width: 100vw
    }

    .container,
    .feedbackContainer,
    main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center
    }

    .container {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    fieldset,
    .feedbackContainer {
        border: rgb(192, 192, 192, 0.1) 1px solid;
        height: 600px;
        box-shadow: 0px 0px 5px 0px rgba(0, 0, 0, 0.12)
    }








    .clear {
        clear: both
    }



    button {
        margin-right: 5px
    }

    .container div {
        margin: 10px 40px;
        position: relative
    }

    img {
        width: 100px;
        height: 100px;
        margin: auto;
        display: block
    }

    .edit-container div:first-of-type {
        width: 340px;
        margin-top: 50px;
    }



    .focused-field {
        animation-name: gainFocus;
        animation-fill-mode: forwards;
        animation-duration: 0.15s;
        animation-timing-function: ease-out
    }

    @keyframes gainFocus {
        0% {
            top: 56%;
            left: 6px;
            color: #505050;
            font-size: 1rem
        }

        100% {
            top: 0%;
            left: 0px;
            color: #2196f3;
            font-size: 0.9rem
        }
    }

    .unfocused-field {
        animation-name: loseFocus;
        animation-fill-mode: forwards;
        animation-duration: 0.15s;
        animation-timing-function: ease-out
    }

    @keyframes loseFocus {
        0% {
            top: 0%;
            left: 0px;
            color: #2196f3;
            font-size: 0.9rem
        }

        100% {
            top: 56%;
            left: 6px;
            color: #505050;
            font-size: 1rem
        }
    }

    .initial-focused-field {
        top: 0%;
        left: 0px;
        color: #2196f3;
        font-size: 0.9rem
    }

    .initial-unfocused-field {
        top: 56%;
        left: 6px;
        color: #505050;
        font-size: 1rem
    }

    .feedbackContainer {
        height: 300px;
        width: 300px;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        display: none
    }

    .feedbackIcon {
        width: 70px;
        height: 70px;
        margin-bottom: 20px;
    }

    .success .feedbackIcon {
        background-image: url('../img/success.svg');
    }

    .failure .feedbackIcon {
        background-image: url('../img/failure.svg');
    }

    * {
        padding: 0;
        margin: 0;
        font-family: "Prompt", sans-serif;
    }

    body {

        background-image: url(../pic/bglog.svg);
        background-repeat: no-repeat;
        background-size: cover;
        width: 100vw;
        height: 100vh;


    }
</style>

<body>
    <main>
        <section class="container edit-container">
            <fieldset style="border-radius: 10%;" >
                <div>
                    <img id="photoHolder" src="../pic/istockphoto-1300845620-612x612.jpg"
                        style="width: 10; border-radius: 50%;" class="mb-5">
                    <!--https://www.visualpharm.com/free-icon-->
                </div>


                <div class="col form-floating ">
                    <input type="password" class="form-control text-primary" id="newPass" placeholder="." required
                        style="padding-left: 21px;">
                    <label for="newPass"><i class="fa-light fa-lock "></i> Password</label>
                </div>



                <div class="col form-floating mb-3">
                    <input type="text" class="form-control text-primary" id="newName" placeholder="." required
                        style="padding-left: 21px;">
                    <label for="newName"><i class="fa-light fa-user"></i> Display name</label>
                </div>



                <div class="col form-floating mb-5">
                    <input type="url" class="form-control text-primary" id="newPic" placeholder="." required
                        style="padding-left: 21px;">
                    <label for="newPic"><i class="fa-light fa-image"></i> Url of picture</label>
                </div>

                <div class="">
                    <button id="edit" class="btn btn-outline-primary">Edit</button>
                    <button id="back" class="btn btn-outline-secondary">Back</button>
                    <button id="delete" class="btn btn-outline-danger">Delete Account</button>
                </div>
            </fieldset>
        </section>
        <!-- <div class="feedbackContainer success">
            <div class="feedbackIcon"></div>
            <p class="feedbackMessage">Signed up Successfully</p>
        </div>
        <div class="feedbackContainer failure">
            <div class="feedbackIcon"></div>
            <p class="feedbackMessage">Signing up failed</p>
        </div> -->
    </main>

    <div id="notification-area"></div>

</body>

</html>
