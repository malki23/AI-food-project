<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/signup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" />
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://kit-pro.fontawesome.com/releases/v6.2.0/css/pro.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="http://www.w3schools.com/lib/w3.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
</head>

<body>

    <style>



    </style>


    <section class=" justify-content-center form my-4 mx-5">
        <div class="container  justify-content-center  align-items-center ">
            <div class="row rowg g-0 ">

                <div class="   col-lg-12 px-md-5 px-3 pt-5 ">
                    <h1 class=" pt-5 pb-4 fw-bold d-flex justify-content-center  align-items-center justify-content-md-start"
                        style="color:#1B9476 ;">
                        Edit <i class="opacity-100 fa-light fa-plate-utensils fa-flip p-2"
                            style="--fa-animation-duration: 5s;"></i>
                    </h1>
                    <h4 class="pb-2">Sign into your account</h4>
                    <form>
                        <div class="form-row pb-4">
                            <div class="col-lg-10 col-sm-12 m-0">




                                <div>
                                    <img id="photoHolder" src="../pic/istockphoto-1300845620-612x612.jpg" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;
                                   
                                  " class="mb-5">
                                    <!--https://www.visualpharm.com/free-icon-->
                                </div>


                                <div class="col form-floating ">
                                    <input type="password" class="form-control text-primary" id="newPass"
                                        placeholder="." required style="padding-left: 21px;">
                                    <label for="newPass"><i class="fa-light fa-lock "></i> Password</label>
                                </div>



                                <div class="col form-floating mb-3">
                                    <input type="text" class="form-control text-primary" id="newName" placeholder="."
                                        required style="padding-left: 21px;">
                                    <label for="newName"><i class="fa-light fa-user"></i> Display name</label>
                                </div>



                                <div class="col form-floating mb-5">
                                    <input type="url" class="form-control text-primary" id="newPic" placeholder="."
                                        required style="padding-left: 21px;">
                                    <label for="newPic"><i class="fa-light fa-image"></i> Url of picture</label>
                                </div>

                                <div class="row d-flex justify-content-center align-items-center">
                                    <div class="col">
                                        <button id="edit" class="btn btn-outline-primary">Edit</button>
                                    </div>
                                    <div class="col">
                                        <button id="back" class="btn btn-outline-secondary">Back</button>
                                    </div>
                                    <div class="col">
                                        <button id="delete" class="btn btn-outline-danger">Delete Account</button>
                                    </div>
                                </div>


                            </div>
                        </div>
                        <!-- <hr class="text-secondary opacity-100"> -->

                    </form>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
