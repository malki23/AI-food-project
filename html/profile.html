<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Profile</title>
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">


</head>
<style>


  * {
    padding: 0;
    margin: 0;
    font-family: "Montserrat", sans-serif !important;
  }

  .container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center
  }

  .container {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    text-align: center
  }

  button {
    float: right;
    margin: 20px 42px 0px 0px;
    padding: 10px 20px;
    border: 1px solid #2196f3;
    background-color: white;
    color: #2196f3;
    margin-right: 5px;
    margin: 20px 0px 0px 5px
  }

  button:hover {
    background-color: #2196f3;
    color: white;
    cursor: pointer
  }

  .container div {
    margin: 20px 40px;
    position: relative
  }

  img {
    width: 250px;
    height: 250px;
    border-radius: 50%
  }

  p:first-child {
    font-size: 2rem
  }

  #displayNameHolder {
    font-size: 3rem;
    color: #2196f3
  }
</style>

<body>
  <section class="container profile-container">
    <div>
      <p  >Welcome :</p>
      <p id="displayNameHolder">User</p>
      <div><img id="photoHolder" src="../pic/istockphoto-1300845620-612x612.jpg" alt="Profile picture">
      </div>
      <button id="logOut">Logout</button>
      <!-- <button id="mergeAccounts">Merge Accounts</button> -->
        <button id="home">Home</button>

      <button id="modifyAccount">Modify Account</button>
    </div>
  </section>
  <!-- The core Firebase JS SDK is always required and must be listed first -->
 
  <!-- TODO: Add SDKs for Firebase products that you want to use
       https://firebase.google.com/docs/web/setup#reserved-urls -->

  <!-- Initialize Firebase -->
  <script src="../js/profile.js" type="module"></script>
</body>

</html>
